name: Deploy to Cloudflare

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Cloudflare Worker
        run: npx opennextjs-cloudflare build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Verify build output
        run: |
          echo "=== Listing .open-next contents ==="
          ls -la .open-next

          if [ ! -f .open-next/worker.js ]; then
            echo "ERROR: worker.js not found!"
            exit 1
          fi

          # 确认 wrangler.json 文件是否存在
          if [ ! -f .open-next/wrangler.json ]; then
            echo "ERROR: .open-next/wrangler.json not found!"
            exit 1
          fi

      - name: Fix Wrangler Config Path
        run: |
          # 使用绝对路径确保文件可读
          ABS_PATH="$GITHUB_WORKSPACE/.open-next/wrangler.json"

          # 确认文件存在
          if [ ! -f "$ABS_PATH" ]; then
            echo "ERROR: $ABS_PATH not found!"
            exit 1
          fi

          # 使用更精确的 sed 命令替换路径
          sed -i 's|".open-next/assets"|"'$GITHUB_WORKSPACE'/.open-next/assets"|' "$ABS_PATH"

          # 验证修改结果
          echo "=== Fixed assets path ==="
          grep "directory" "$ABS_PATH"

      - name: Deploy to Cloudflare
        run: |
          echo "Current Directory: $(pwd)"
          echo "Files in .open-next:"
          ls -la .open-next/

          # 使用绝对路径部署
          npx wrangler deploy "$GITHUB_WORKSPACE/.open-next/wrangler.json"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_COMPATIBILITY_FLAGS: nodejs_compat_v2
          WRANGLER_COMPATIBILITY_DATE: 2026-03-28

name: Deploy to Cloudflare

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Cloudflare Worker
        run: npx opennextjs-cloudflare build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Verify Build Output
        run: |
          echo "=== Checking .open-next directory ==="
          ls -la .open-next
          if [ ! -f .open-next/worker.js ]; then
            echo "ERROR: worker.js not found!"
            exit 1
          fi

      - name: List .open-next Directory
        run: |
          echo "📄 .open-next 目录内容："
          ls -la .open-next
          echo "\n📄 .open-next/assets 目录内容："
          ls -la .open-next/assets

      - name: Check Root Directory Files
        run: |
          echo "📄 Root Directory Files:"
          ls -la

      - name: Deploy to Cloudflare
        run: |
          echo "🚀 Starting Deployment..."
          npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_COMPATIBILITY_DATE: 2026-03-28

name: Deploy to Cloudflare

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Cloudflare Worker
        run: npx opennextjs-cloudflare build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_PAYPAL_CLIENT_ID: ${{ vars.NEXT_PUBLIC_PAYPAL_CLIENT_ID }}
          NEXT_PUBLIC_PAYPAL_PLAN_ID: ${{ vars.NEXT_PUBLIC_PAYPAL_PLAN_ID }}

      # --- 新增的调试步骤：验证 wrangler.toml 内容 ---
      - name: Verify Wrangler Config
        run: |
          echo "📄 Current Directory:"
          ls -la
          echo "\n📄 Contents of wrangler.toml:"
          cat wrangler.toml
          echo "\n\n✅ Ensure the file contains 'nodejs_compat_v2' in compatibility_flags"
        # 这一步是为了防止因为文件没提交或路径不对导致配置丢失

      - name: Deploy to Cloudflare
        run: |
          echo "🚀 Starting Deployment..."
          # 关键点1：不再使用命令行 flag，而是依赖 wrangler.toml 中的配置
          # 关键点2：显式指定配置文件路径 --config wrangler.toml
          npx wrangler deploy --config wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # 关键点3：环境变量中的日期必须存在
          WRANGLER_COMPATIBILITY_DATE: 2026-03-28

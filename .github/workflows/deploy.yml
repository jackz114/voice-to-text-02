name: Deploy to Cloudflare

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Cloudflare Worker
        # 修正1: 移除了 --output-dir
        # 修正2: 添加了 NEXT_TELEMETRY_DISABLED
        run: npx opennextjs-cloudflare build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          # ... 这里放你的所有 Secrets ...

      - name: Verify build output (Debug)
        run: |
          echo "=== Listing .open-next contents ==="
          ls -la .open-next

          # 检查 worker.js 是否存在
          if [ ! -f .open-next/worker.js ]; then
            echo "ERROR: worker.js not found!"
            exit 1
          fi

      - name: Copy Wrangler Config (关键步骤)
        # OpenNext 不会自动复制 wrangler.jsonc，我们必须手动把它放到 .open-next 目录里
        # 这样 npx opennextjs-cloudflare deploy 才能读取到 nodejs_compat_v2 配置
        run: |
          cp wrangler.jsonc .open-next/wrangler.jsonc
          echo "Copied wrangler.jsonc to .open-next/"

      - name: Deploy to Cloudflare
        run: npx @opennextjs/cloudflare deploy --compatibility-flags nodejs_compat_v2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
